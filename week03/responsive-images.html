<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images Practice</title>
    <meta name="description" content="A responsive images loading practice">
    <meta name="author" content="Cassandra Carone">
</head>
<body>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="min-width: 1000px">
                <source srcset="images/hero-medium.webp" media="min-width: 500px">
                <img src="images/hero-small.webp" alt="Bern, Switzerland Temple" width="1500" height="750">
            </picture>
        </div>
    </main>
</body>
</html>
